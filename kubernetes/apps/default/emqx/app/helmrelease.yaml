---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emqx
spec:
  interval: 30m
  chart:
    spec:
      # The 2.3.x operator series breaks open-source EMQX: every reconcile it calls
      # the enterprise-only /api/v5/load_rebalance/global_status API, which 404s as
      # a fatal error, so the operator never sets the apps.emqx.io/on-serving pod
      # readiness gate -> emqx-listeners Service has no serving endpoints -> MQTT
      # clients get EHOSTUNREACH. 2.3.0 was already reverted once before; pin to the
      # last known-good 2.2.29 and keep it off the 2.3.x line.
      chart: emqx-operator
      version: 2.3.2
      sourceRef:
        kind: HelmRepository
        name: emqx
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: emqx-operator
    image:
      repository: ghcr.io/emqx/emqx-operator
