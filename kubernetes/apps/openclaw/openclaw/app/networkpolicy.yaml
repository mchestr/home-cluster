apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-allow-envoy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
      ports:
        - protocol: TCP
          port: 18789
---
# Allow ingress from the cluster's own node identities on all ports. Two reasons:
#   1. Cross-node Envoy traffic is SNATed to the node IP; all 3 nodes are control
#      plane, so Cilium tags it kube-apiserver — that reaches the gateway (18789).
#   2. kube-apiserver REPLY traffic to the openclaw pod (the kube-mcp sidecar
#      calling the API for its cluster-admin access) comes back tagged with a
#      node identity to the sidecar's ephemeral ports. Without an all-ports allow
#      here, openclaw's default-deny ingress drops the API SYN-ACK and every
#      cluster call times out. host/remote-node cover same-node and worker paths.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-allow-remote-node
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  ingress:
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
# NOTE: no egress policy. openclaw needs to reach DNS, the Anthropic API,
# ClawHub (plugin install), memini, and the in-cluster TEI embeddings server.
# In Cilium's default mode, adding any egress rule would switch openclaw to
# egress default-deny; since openclaw is granted cluster-admin anyway, we leave
# egress unrestricted.
