apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-allow-envoy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
      ports:
        - protocol: TCP
          port: 18789
---
# Cross-node Envoy traffic gets SNATed to the node IP. All 3 nodes are control
# plane nodes, so Cilium classifies their IPs as kube-apiserver (identity 7).
# This CiliumNetworkPolicy allows that masqueraded traffic on the gateway port.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-allow-remote-node
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "18789"
              protocol: TCP
# NOTE: no egress policy. openclaw needs to reach DNS, the Anthropic API,
# ClawHub (plugin install), memini, and the in-cluster TEI embeddings server.
# In Cilium's default mode, adding any egress rule would switch openclaw to
# egress default-deny; since openclaw is granted cluster-admin anyway, we leave
# egress unrestricted.
