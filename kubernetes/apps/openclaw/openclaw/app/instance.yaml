apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-secret
  env:
    - name: RADARR_URL
      value: "https://radarr.chestr.dev"
    - name: SONARR_URL
      value: "https://sonarr.chestr.dev"
  skills: []
  runtimeDeps:
    python: true
  gateway:
    controlUiOrigins:
      - "https://openclaw.chestr.dev"
    existingSecret: openclaw-secret
  config:
    mergeMode: overwrite
    raw:
      agents:
        defaults:
          model:
            primary: "anthropic/claude-haiku-4-5-20251001"
      skills:
        load:
          extraDirs:
            - "/home/openclaw/.openclaw/skills"
      channels:
        signal:
          enabled: true
          dmPolicy: pairing
          cliPath: /home/openclaw/.openclaw/bin/signal-cli
  initContainers:
    - name: install-signal-cli
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          BIN=/home/openclaw/.openclaw/bin
          mkdir -p "$BIN"
          if [ ! -f "$BIN/signal-cli-bin" ]; then
            wget -qO /tmp/signal-cli.tar.gz https://github.com/AsamK/signal-cli/releases/download/v0.14.1/signal-cli-0.14.1-Linux-native.tar.gz
            tar -xzf /tmp/signal-cli.tar.gz -C "$BIN"
            mv "$BIN/signal-cli" "$BIN/signal-cli-bin"
            chmod +x "$BIN/signal-cli-bin"
          fi
          printf '#!/bin/sh\nexec %s/signal-cli-bin -c /home/openclaw/.openclaw/signal-cli "$@"\n' "$BIN" > "$BIN/signal-cli"
          chmod +x "$BIN/signal-cli"
      volumeMounts:
        - name: data
          mountPath: /home/openclaw/.openclaw
  storage:
    persistence:
      enabled: true
      size: 10Gi
