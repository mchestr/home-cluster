---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controller:
      leaderElection:
        enabled: true
    webhook:
      enabled: true
    # No local llmkube backend in this cluster — chat is routed to a hosted
    # provider, so don't auto-register llmkube InferenceServices as models.
    llmkube:
      autoRegister: false
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
