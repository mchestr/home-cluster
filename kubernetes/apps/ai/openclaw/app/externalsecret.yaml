# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_AUTH_TOKEN }}"
        # Dedicated bearer token for the /hooks/agent endpoint (alert-adapter).
        # Scoped separately from the gateway/UI token. Add a field named
        # OPENCLAW_HOOKS_TOKEN to the "openclaw" 1Password item.
        OPENCLAW_HOOKS_TOKEN: "{{ .OPENCLAW_HOOKS_TOKEN }}"
        RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
        MEMINI_API_KEY: "{{ .MEMINI_API_KEY }}"
        SIGNAL_PHONE_NUMBER: "{{ .SIGNAL_PHONE_NUMBER }}"
        # gh auto-authenticates from this. Add a (scoped) PAT named GITHUB_TOKEN
        # to the "openclaw" 1Password item.
        GITHUB_TOKEN: "{{ .GITHUB_TOKEN }}"
  dataFrom:
    - extract:
        key: openclaw
    - extract:
        key: radarr
    - extract:
        key: sonarr
    - extract:
        key: memini
