# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_AUTH_TOKEN }}"
        # Dedicated bearer token for the /hooks/agent endpoint (alert-adapter).
        # Scoped separately from the gateway/UI token. Add a field named
        # OPENCLAW_HOOKS_TOKEN to the "openclaw" 1Password item.
        OPENCLAW_HOOKS_TOKEN: "{{ .OPENCLAW_HOOKS_TOKEN }}"
        AUTOBRR_API_KEY: "{{ .AUTOBRR_API_KEY }}"
        BAZARR_API_KEY: "{{ .BAZARR_API_KEY }}"
        CROSS_SEED_API_KEY: "{{ .CROSS_SEED_API_KEY }}"
        JELLYFIN_API_KEY: "{{ .JELLYFIN_HOMEPAGE_API_KEY }}"
        JELLYSEERR_API_KEY: "{{ .JELLYSEERR_API_KEY }}"
        PLEX_API_TOKEN: "{{ .PLEX_API_TOKEN }}"
        PROWLARR_API_KEY: "{{ .PROWLARR_API_KEY }}"
        RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        SABNZBD_API_KEY: "{{ .SABNZBD_API_KEY }}"
        SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
        TAUTULLI_API_KEY: "{{ .TAUTULLI_API_KEY }}"
        MEMINI_API_KEY: "{{ .MEMINI_API_KEY }}"
        SIGNAL_PHONE_NUMBER: "{{ .SIGNAL_PHONE_NUMBER }}"
        # gh auto-authenticates from this. Add a (scoped) PAT named GITHUB_TOKEN
        # to the "openclaw" 1Password item.
        GITHUB_TOKEN: "{{ .GITHUB_TOKEN }}"
  dataFrom:
    - extract:
        key: autobrr
    - extract:
        key: bazarr
    - extract:
        key: cross-seed
    - extract:
        key: jellyfin
    - extract:
        key: jellyseerr
    - extract:
        key: plex
    - extract:
        key: prowlarr
    - extract:
        key: openclaw
    - extract:
        key: radarr
    - extract:
        key: sabnzbd
    - extract:
        key: sonarr
    - extract:
        key: tautulli
    - extract:
        key: memini
