apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-allow-envoy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
      ports:
        - protocol: TCP
          port: 18789
        # code-server sidecar (openclaw-code.chestr.dev)
        - protocol: TCP
          port: 12321
---
# Cross-node Envoy traffic gets SNATed to the node IP. All 3 nodes are control
# plane, so Cilium classifies their IPs as kube-apiserver. This allows that
# masqueraded ingress to reach the gateway port.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-allow-remote-node
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "18789"
              protocol: TCP
            # code-server sidecar (openclaw-code.chestr.dev). Envoy runs on
            # m1/m2 while openclaw is on m0, so this cross-node (SNATed) path
            # is what actually gates the gateway -> code-server traffic.
            - port: "12321"
              protocol: TCP
  # Egress allowlist. The kube-mcp sidecar (cluster-admin) needs the kube-apiserver
  # entity, which Cilium does NOT cover under default-allow egress — without this
  # explicit entry every API call from the pod times out. `cluster` covers DNS and
  # the in-cluster memini/searxng/TEI services; `world` covers the OpenAI/Anthropic
  # APIs, ClawHub, HuggingFace, and the signal-cli GitHub download.
  egress:
    - toEntities:
        - cluster
        - kube-apiserver
        - world
