---
# Generic bundle of OpenClaw skills. Each data key is one skill's SKILL.md body,
# named "<skill>.md". helmrelease.yaml mounts each key to its own directory at
# /skills/<skill>/SKILL.md (OpenClaw only discovers a skill from a file named
# SKILL.md), and skills.load.extraDirs in openclaw.json points at /skills.
#
# To add another skill:
#   1. add a "<name>.md" key below with the SKILL.md content
#   2. add a matching globalMount in helmrelease.yaml (persistence.skills)
#   3. optionally add an entry under skills.entries in configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skills
data:
  prometheus.md: |
    ---
    name: prometheus
    description: Query the cluster Prometheus HTTP API (PromQL) to inspect metrics, alerts, and targets during investigations
    metadata:
      { "openclaw": { "emoji": "📊", "homepage": "https://prometheus.io/docs/prometheus/latest/querying/api/" } }
    user-invocable: true
    disable-model-invocation: false
    ---

    Use this skill whenever you need live or historical metrics from the cluster
    Prometheus — triaging an alert, confirming a symptom, or checking trends.

    ## Endpoint

    Base URL (in-cluster, no auth): `http://prometheus-operated.observability.svc.cluster.local:9090`

    Query it with `curl` from the exec tool. Always URL-encode the query
    (`curl --data-urlencode`). Pipe through `jq` if available.

    ## Common API calls

    Instant query (current value):

    ```sh
    curl -sG http://prometheus-operated.observability.svc.cluster.local:9090/api/v1/query \
      --data-urlencode 'query=up == 0'
    ```

    Range query (trend over a window; start/end are Unix timestamps in seconds —
    compute them with `date +%s`):

    ```sh
    curl -sG http://prometheus-operated.observability.svc.cluster.local:9090/api/v1/query_range \
      --data-urlencode 'query=rate(container_cpu_usage_seconds_total[5m])' \
      --data-urlencode 'start=<unix-ts-1h-ago>' \
      --data-urlencode 'end=<unix-ts-now>' \
      --data-urlencode 'step=60'
    ```

    Currently firing alerts: `GET /api/v1/alerts`
    Scrape targets / health:   `GET /api/v1/targets`
    List metric names:         `GET /api/v1/label/__name__/values`

    ## Useful PromQL for triage

    - Pods restarting:        `increase(kube_pod_container_status_restarts_total[15m]) > 0`
    - Pods not running:       `kube_pod_status_phase{phase!="Running",phase!="Succeeded"} == 1`
    - OOMKilled containers:   `kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}`
    - Container memory vs limit: `container_memory_working_set_bytes / kube_pod_container_resource_limits{resource="memory"}`
    - Node memory pressure:   `(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100`
    - Node disk usage:        `(1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100`
    - PVC nearly full:        `kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85`
    - Down scrape targets:    `up == 0`
    - Ceph health:            `ceph_health_status`
    - Per-pod CPU (cores):    `sum by (pod) (rate(container_cpu_usage_seconds_total{container!=""}[5m]))`

    ## Tips

    - Scope queries with label matchers (e.g. `{namespace="rook-ceph"}`) to cut noise.
    - Use `topk(10, ...)` to surface the worst offenders.
    - Cross-check a metric spike against `kubectl`/MCP pod events and logs before
      concluding a root cause.
    - For Alertmanager-triggered investigations, start with the alert's labels
      (`namespace`, `pod`, `node`, `job`, `instance`) and compare the firing time
      against recent Prometheus metrics. Use the victorialogs skill when
      container logs are needed to confirm the failure mode.

  victorialogs.md: |
    ---
    name: victorialogs
    description: Query cluster application logs during investigations. This cluster stores logs in VictoriaLogs, exposed through the VictoriaLogs HTTP API.
    metadata:
      { "openclaw": { "emoji": "logs", "homepage": "https://docs.victoriametrics.com/victorialogs/querying/" } }
    user-invocable: true
    disable-model-invocation: false
    ---

    Use this skill whenever you need Kubernetes container logs during an
    investigation, especially after a Prometheus alert points at a namespace,
    pod, app, node, or workload.

    Logs are collected by Fluent Bit and stored in VictoriaLogs. Use the
    VictoriaLogs LogsQL HTTP API below.

    ## Endpoint

    Base URL (in-cluster, no auth): `http://victoria-logs-server.observability.svc.cluster.local:9428`

    Query it with `curl` from the exec tool. Always send LogsQL in the `query`
    form field and keep result sets bounded with `_time` filters and `limit`.
    Pipe JSON lines through `jq` if available.

    ## Common API calls

    Recent logs for an app:

    ```sh
    curl -s http://victoria-logs-server.observability.svc.cluster.local:9428/select/logsql/query \
      -d 'query=app:"openclaw" AND _time:30m | fields _time, k_namespace_name, k_pod_name, app, _msg | limit 100'
    ```

    Recent logs for a namespace:

    ```sh
    curl -s http://victoria-logs-server.observability.svc.cluster.local:9428/select/logsql/query \
      -d 'query=k_namespace_name:"rook-ceph" AND _time:30m | fields _time, k_pod_name, app, _msg | limit 100'
    ```

    Recent logs for a pod:

    ```sh
    curl -s http://victoria-logs-server.observability.svc.cluster.local:9428/select/logsql/query \
      -d 'query=k_pod_name:"<pod-name>" AND _time:30m | fields _time, app, _msg | limit 100'
    ```

    Error-like logs near an alert:

    ```sh
    curl -s http://victoria-logs-server.observability.svc.cluster.local:9428/select/logsql/query \
      -d 'query=(error OR failed OR panic OR timeout OR denied OR refused OR OOMKilled) AND _time:30m | fields _time, k_namespace_name, k_pod_name, app, _msg | limit 200'
    ```

    Discover useful fields:

    ```sh
    curl -s http://victoria-logs-server.observability.svc.cluster.local:9428/select/logsql/field_names \
      -d 'query=_time:30m'
    ```

    Discover streams matching a symptom:

    ```sh
    curl -s http://victoria-logs-server.observability.svc.cluster.local:9428/select/logsql/streams \
      -d 'query=error AND _time:30m' \
      -d 'limit=20'
    ```

    ## Cluster log fields

    Fluent Bit normalizes Kubernetes metadata into these useful fields:

    - `k_namespace_name`: Kubernetes namespace.
    - `k_pod_name`: Kubernetes pod name.
    - `app`: best-effort app/container label.
    - `_time`: log timestamp.
    - `_msg`: log message.
    - `source`: always `home-cluster`.

    ## Investigation flow

    - Start from alert labels and query narrowly by namespace, pod, or app.
    - Look at logs around `startsAt` first; widen to 30m or 1h only if needed.
    - Prefer specific terms from the alert summary before broad error searches.
    - Cross-check log evidence with Kubernetes events, pod status, and
      Prometheus metrics before naming a root cause.
    - Stay read-only during alert investigations.

  kubernetes-events.md: |
    ---
    name: kubernetes-events
    description: Inspect Kubernetes events, pod status, and object descriptions to explain scheduling, probe, image pull, volume, and lifecycle failures
    metadata:
      { "openclaw": { "emoji": "events", "homepage": "https://kubernetes.io/docs/reference/kubectl/generated/kubectl_events/" } }
    user-invocable: true
    disable-model-invocation: false
    ---

    Use this skill early in Kubernetes incident investigations. Events often
    explain why a symptom started: failed scheduling, image pull errors, probe
    failures, volume attachment problems, evictions, and rollout churn.

    ## Fast checks

    Recent events across the cluster:

    ```sh
    kubectl get events -A --sort-by=.lastTimestamp
    ```

    Recent warning events:

    ```sh
    kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp
    ```

    Events in one namespace:

    ```sh
    kubectl get events -n <namespace> --sort-by=.lastTimestamp
    ```

    Describe the object named by an alert:

    ```sh
    kubectl describe pod -n <namespace> <pod>
    kubectl describe deploy -n <namespace> <deployment>
    kubectl describe statefulset -n <namespace> <statefulset>
    kubectl describe pvc -n <namespace> <claim>
    ```

    Check pod state compactly:

    ```sh
    kubectl get pod -n <namespace> <pod> -o wide
    kubectl get pod -n <namespace> <pod> -o jsonpath='{range .status.containerStatuses[*]}{.name}{" ready="}{.ready}{" restarts="}{.restartCount}{" reason="}{.state.waiting.reason}{.state.terminated.reason}{"\n"}{end}'
    ```

    ## What to look for

    - `FailedScheduling`: node selectors, taints, resource pressure, PVC binding.
    - `FailedMount` or `FailedAttachVolume`: storage, Ceph, CSI, stale attachments.
    - `BackOff`, `Unhealthy`, `Killing`: probes, crashes, rollout issues.
    - `ErrImagePull` or `ImagePullBackOff`: registry, tag, auth, DNS.
    - `Evicted`: node pressure, ephemeral storage, memory pressure.
    - `NetworkNotReady` or sandbox failures: CNI or node runtime issues.

    ## Investigation flow

    - Start with the namespace and object labels from the alert payload.
    - Compare event timestamps with the alert `startsAt` time.
    - Use `describe` output for conditions and recent event context.
    - Cross-check with Prometheus metrics and VictoriaLogs before concluding.
    - Stay read-only during alert investigations.

  flux.md: |
    ---
    name: flux
    description: Inspect Flux Kustomization, HelmRelease, source, and reconciliation state in this GitOps-managed cluster
    metadata:
      { "openclaw": { "emoji": "flux", "homepage": "https://fluxcd.io/flux/cmd/" } }
    user-invocable: true
    disable-model-invocation: false
    ---

    Use this skill when an incident may be caused by GitOps drift, failed
    reconciliation, a bad HelmRelease, a source problem, or a recently applied
    change. This cluster is reconciled by Flux from the `kubernetes/` tree.

    Keep investigations read-only unless explicitly told to remediate.

    ## Fast checks

    Flux Kustomizations:

    ```sh
    flux get kustomizations -A
    ```

    HelmReleases:

    ```sh
    flux get helmreleases -A
    ```

    Sources:

    ```sh
    flux get sources git -A
    flux get sources helm -A
    flux get sources oci -A
    ```

    Recent Flux controller logs:

    ```sh
    flux logs --all-namespaces --level=error --since=1h
    ```

    ## Kubernetes fallbacks

    If the `flux` CLI is unavailable, use Kubernetes resources directly:

    ```sh
    kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A
    kubectl get helmreleases.helm.toolkit.fluxcd.io -A
    kubectl describe kustomization -n <namespace> <name>
    kubectl describe helmrelease -n <namespace> <name>
    ```

    Inspect status conditions as JSON:

    ```sh
    kubectl get helmrelease -n <namespace> <name> -o jsonpath='{range .status.conditions[*]}{.type}{" status="}{.status}{" reason="}{.reason}{" message="}{.message}{"\n"}{end}'
    kubectl get kustomization -n <namespace> <name> -o jsonpath='{range .status.conditions[*]}{.type}{" status="}{.status}{" reason="}{.reason}{" message="}{.message}{"\n"}{end}'
    ```

    ## What to look for

    - `Ready=False` Kustomizations or HelmReleases.
    - Source fetch errors, auth errors, invalid chart references, or bad values.
    - Dependency waits, health check failures, and remediation rollbacks.
    - Reconciliation times close to the alert `startsAt` time.
    - A Flux failure in the same namespace as the failing workload.

    ## Investigation flow

    - Start with `flux get kustomizations -A` and `flux get helmreleases -A`.
    - If an app is failing, inspect its namespace's HelmRelease and parent
      Kustomization.
    - Compare Flux reconciliation events with Kubernetes events and app logs.
    - Report whether the issue is likely an applied config problem, a failed
      reconciliation, or runtime failure after a successful reconcile.
