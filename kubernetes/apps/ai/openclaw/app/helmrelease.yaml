---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      # openclaw is granted cluster-admin (see rbac.yaml); mount its SA token.
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    serviceAccount:
      openclaw: {}
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -eu
                mkdir -p /home/node/.openclaw
                cp /tmp/openclaw.json /home/node/.openclaw/openclaw.json
                chmod 600 /home/node/.openclaw/openclaw.json
          # signal-cli native binary for the Signal channel, persisted on the PVC.
          # $$ escapes Flux postBuild so the shell receives a literal $.
          install-signal-cli:
            image:
              repository: docker.io/library/busybox
              tag: "1.38"
            command:
              - sh
              - -c
              - |
                set -eu
                # renovate: datasource=github-releases depName=AsamK/signal-cli
                SIGNAL_CLI_VERSION=0.14.5
                BIN=/home/node/.openclaw/bin
                mkdir -p "$$BIN"
                if [ ! -x "$$BIN/signal-cli" ]; then
                  wget -qO /tmp/signal-cli.tar.gz "https://github.com/AsamK/signal-cli/releases/download/v$$SIGNAL_CLI_VERSION/signal-cli-$$SIGNAL_CLI_VERSION-Linux-native.tar.gz"
                  tar -xzf /tmp/signal-cli.tar.gz -C "$$BIN"
                  chmod +x "$$BIN/signal-cli"
                fi
          # GitHub CLI on the PVC at ~/.local/bin (on PATH for the agent's exec
          # tool). Auth comes from the GITHUB_TOKEN env, so no `gh auth login`.
          install-gh:
            image:
              repository: docker.io/library/busybox
              tag: "1.38"
            command:
              - sh
              - -c
              - |
                set -eu
                # renovate: datasource=github-releases depName=cli/cli
                GH_VERSION=2.95.0
                BIN=/home/node/.local/bin
                mkdir -p "$$BIN"
                if [ "$$(cat "$$BIN/.ghver" 2>/dev/null)" != "$$GH_VERSION" ]; then
                  wget -qO /tmp/gh.tar.gz "https://github.com/cli/cli/releases/download/v$$GH_VERSION/gh_$${GH_VERSION}_linux_amd64.tar.gz"
                  tar -xzf /tmp/gh.tar.gz -C /tmp
                  cp "/tmp/gh_$${GH_VERSION}_linux_amd64/bin/gh" "$$BIN/gh"
                  chmod +x "$$BIN/gh"
                  printf '%s' "$$GH_VERSION" > "$$BIN/.ghver"
                  rm -rf /tmp/gh.tar.gz "/tmp/gh_$${GH_VERSION}_linux_amd64"
                fi
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.11@sha256:3814fb1f62f9cfc5944de088c5817c68c88b5d721feebe36420b666a90a61ce7
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                # Install non-bundled ClawHub plugins (memini memory + signal
                # channel). The installer refuses to run against a config that
                # references not-yet-installed plugins (chicken-and-egg), so move
                # the config aside during install and restore it for the gateway.
                # $$ escapes Flux postBuild so the shell receives a literal $.
                # renovate: datasource=github-tags depName=eleboucher/memini
                MEMINI_PLUGIN_VERSION=0.5.2
                CFG=/home/node/.openclaw/openclaw.json
                EXT=/home/node/.openclaw/extensions
                NEED=0
                [ "$$(cat "$$EXT/memini/.clawver" 2>/dev/null)" != "$$MEMINI_PLUGIN_VERSION" ] && NEED=1
                [ ! -d "$$EXT/signal" ] && NEED=1
                if [ "$$NEED" = 1 ]; then
                  [ -f "$$CFG" ] && mv "$$CFG" "$$CFG.installtmp"
                  if node dist/index.js plugins install "clawhub:@eleboucher/memini@$$MEMINI_PLUGIN_VERSION" --pin --force; then
                    mkdir -p "$$EXT/memini" && printf '%s' "$$MEMINI_PLUGIN_VERSION" > "$$EXT/memini/.clawver"
                  else
                    echo "WARN: memini plugin install failed"
                  fi
                  if [ ! -d "$$EXT/signal" ]; then
                    node dist/index.js plugins install "clawhub:@openclaw/signal" --pin --force \
                      || echo "WARN: signal plugin install failed"
                  fi
                  [ -f "$$CFG.installtmp" ] && mv "$$CFG.installtmp" "$$CFG"
                fi
                # Persist gh credentials to the on-disk config. openclaw's exec
                # tool strips secret env vars (GITHUB_TOKEN included), so the agent
                # can't auth gh from the env — but it does read ~/.config/gh on the
                # PVC. Re-runs each boot so token rotation is picked up.
                if [ -n "$$GITHUB_TOKEN" ]; then
                  printf '%s' "$$GITHUB_TOKEN" | env -u GITHUB_TOKEN -u GH_TOKEN gh auth login --with-token >/dev/null 2>&1 \
                    && echo "gh: credentials persisted to ~/.config/gh" || echo "WARN: gh credential persist failed"
                fi
                # OpenClaw's config-integrity guard persists a self-saved
                # "last-good" snapshot on the PVC and restores it whenever the
                # config it reads lacks the runtime-injected "meta" block
                # (suspicious: missing-meta-vs-last-good). Our GitOps ConfigMap
                # copy never has that meta block, so on every boot the guard
                # reverted to a stale snapshot and silently dropped config
                # changes (fallbacks, providers, timeouts never went live). Drop
                # the persisted last-good/backup/health state so the gateway
                # adopts the current ConfigMap-derived config as the new
                # baseline. git is the source of truth for this deployment.
                rm -f "$${CFG}.last-good" "$${CFG}".bak* /home/node/.openclaw/logs/config-health.json
                exec node dist/index.js gateway --bind lan
            env:
              HOME: &homepath /home/node
              TZ: America/Vancouver
              # Prepend ~/.local/bin so the agent's exec tool finds gh (and any
              # other PVC-installed binaries). /usr/local/bin keeps node on PATH.
              PATH: /home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              OPENCLAW_GATEWAY_PORT: &port 18789
              OPENCLAW_LOG_LEVEL: info
              RADARR_URL: "https://radarr.chestr.dev"
              SONARR_URL: "https://sonarr.chestr.dev"
            envFrom:
              - secretRef:
                  name: openclaw-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 8Gi
          # Kubernetes MCP server sidecar. Auto-detects in-cluster config and so
          # uses the pod's ServiceAccount token (cluster-admin). Listens on
          # localhost:8081; openclaw reaches it in-pod, and the ingress
          # NetworkPolicy keeps the port unreachable from other pods. Add
          # --read-only or --disable-destructive here to scope down what openclaw
          # can do via MCP without changing the RBAC.
          kube-mcp:
            image:
              repository: ghcr.io/containers/kubernetes-mcp-server
              tag: v0.0.63@sha256:9317449ed47916a297f71b955eab57402064de852bf1fb007c4e0705754de2b3
            args: ["--port", "8081"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
          # VS Code (code-server) sidecar to browse the memory-wiki vault and
          # openclaw's config/state. Password-protected with the gateway token —
          # this pod holds a cluster-admin token, so never expose it unauthed.
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.127.0@sha256:4193b3a0c2661bce87b3cafede59e7d50e1e99e35f7c10bece7c2a7e0660c0a8
            env:
              HOME: *homepath
              TZ: America/Vancouver
              PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: OPENCLAW_GATEWAY_TOKEN
            args:
              - --auth
              - password
              - --user-data-dir
              - /home/node/.vscode
              - --extensions-dir
              - /home/node/.vscode
              - --port
              - "12321"
              - /home/node/.openclaw
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: *homepath
      configmap:
        type: configMap
        name: openclaw-config
        defaultMode: 0644
        globalMounts:
          - path: /tmp/openclaw.json
            subPath: openclaw.json
      # Generic skills bundle. Each ConfigMap key is mounted to its own
      # /skills/<name>/SKILL.md (OpenClaw discovers skills by the SKILL.md
      # filename); skills.load.extraDirs in openclaw.json points at /skills.
      # Add a globalMount line per skill key in skills.yaml.
      skills:
        type: configMap
        name: openclaw-skills
        defaultMode: 0644
        globalMounts:
          - path: /skills/prometheus/SKILL.md
            subPath: prometheus.md
          - path: /skills/victorialogs/SKILL.md
            subPath: victorialogs.md
          - path: /skills/autobrr/SKILL.md
            subPath: autobrr.md
          - path: /skills/bazarr/SKILL.md
            subPath: bazarr.md
          - path: /skills/cross-seed/SKILL.md
            subPath: cross-seed.md
          - path: /skills/jellyfin/SKILL.md
            subPath: jellyfin.md
          - path: /skills/jellyseerr/SKILL.md
            subPath: jellyseerr.md
          - path: /skills/plex/SKILL.md
            subPath: plex.md
          - path: /skills/prowlarr/SKILL.md
            subPath: prowlarr.md
          - path: /skills/qbittorrent/SKILL.md
            subPath: qbittorrent.md
          - path: /skills/sonarr/SKILL.md
            subPath: sonarr.md
          - path: /skills/radarr/SKILL.md
            subPath: radarr.md
          - path: /skills/sabnzbd/SKILL.md
            subPath: sabnzbd.md
          - path: /skills/tautulli/SKILL.md
            subPath: tautulli.md
          - path: /skills/kubernetes-events/SKILL.md
            subPath: kubernetes-events.md
          - path: /skills/flux/SKILL.md
            subPath: flux.md
      tmp:
        type: emptyDir
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
          codeserver:
            port: &codeserverPort 12321
    route:
      app:
        hostnames: ["{{ .Release.Name }}.chestr.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
      codeserver:
        hostnames: ["openclaw-code.chestr.dev"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *codeserverPort
